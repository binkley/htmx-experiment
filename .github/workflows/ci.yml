name: CI Pipeline

on:
  push:
    branches: ['main']
    paths-ignore:
      - 'README.md'
  pull_request:
    branches: ['main']
    paths-ignore:
      - 'README.md'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '26'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run validation and tests
        run: npm run validate:push
